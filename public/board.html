<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>mesh</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #0b0e14; color: #c9d1d9; height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 16px; padding: 10px 16px;
    border-bottom: 1px solid #1c2230; background: #0d1117;
  }
  header .brand { font-weight: 700; font-size: 15px; letter-spacing: .5px; }
  header .stat { color: #8b949e; }
  header .stat b { color: #c9d1d9; font-weight: 600; }
  header .updated { margin-left: auto; color: #565d68; font-size: 11px; }
  header .out { background: transparent; border: 1px solid #1c2230; color: #8b949e; border-radius: 6px; padding: 4px 9px; font: inherit; cursor: pointer; }
  header .out:hover { border-color: #f85149; color: #f85149; }
  .wrap { display: grid; grid-template-columns: 1.15fr 1fr; height: calc(100vh - 45px); }
  .col { overflow-y: auto; padding: 14px 16px; }
  .col.org { border-right: 1px solid #1c2230; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #565d68; margin: 0 0 12px; font-weight: 600; }
  .right { display: grid; grid-template-rows: 1fr minmax(230px, 42%); height: 100%; overflow: hidden; }
  .right .feed { overflow-y: auto; padding: 14px 16px; min-height: 0; }
  .right .tasks { border-top: 1px solid #1c2230; padding: 12px 16px; overflow-y: auto; background: #0d1117; min-height: 0; }

  .node .kids { margin-left: 16px; border-left: 1px solid #222b39; padding-left: 14px; }
  .card {
    display: inline-flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    background: #11161f; border: 1px solid #1c2230; border-radius: 8px;
    padding: 7px 11px; margin: 4px 0; max-width: 100%;
  }
  .card.off { opacity: .45; }
  .dot { width: 8px; height: 8px; border-radius: 50%; align-self: center; flex: none; }
  /* a working agent's light pulses; a blocked one blinks red for attention */
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(63,185,80,.5); } 70% { box-shadow: 0 0 0 7px rgba(63,185,80,0); } 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); } }
  @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(248,81,73,.6); } 70% { box-shadow: 0 0 0 7px rgba(248,81,73,0); } 100% { box-shadow: 0 0 0 0 rgba(248,81,73,0); } }
  .dot.pulse { animation: pulse 1.4s infinite; }
  .dot.pulse-red { animation: pulseRed .9s infinite; }
  .card.live { border-color: #234d2e; }
  .name { font-weight: 700; color: #e6edf3; }
  .host { font-size: 10px; color: #56d4dd; border: 1px solid #1c3a3d; border-radius: 4px; padding: 0 5px; }
  .pill { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; border: 1px solid; border-radius: 999px; padding: 1px 7px; }
  .task { flex-basis: 100%; color: #c2cad6; font-size: 12px; margin-top: 3px; line-height: 1.5; white-space: normal; word-break: break-word; }
  .task .when, .task .building, .task .dim2 { color: #565d68; }
  .task .blockedlbl { color: #f85149; }
  .trow .gate { color: #f85149; }
  .trow .tbase { color: #6e7681; }
  .empty { color: #565d68; font-style: italic; }

  .msg { padding: 6px 0; border-bottom: 1px solid #141a24; }
  .msg .meta { display: flex; gap: 7px; align-items: baseline; }
  .msg .time { color: #565d68; font-size: 11px; }
  .msg .from { font-weight: 700; }
  .msg .to { color: #8b949e; font-size: 11px; }
  .msg .to.bcast { color: #d29922; }
  .msg .body { color: #c9d1d9; margin-top: 2px; white-space: pre-wrap; word-break: break-word; }
  .msg .body.long { max-height: 5.5em; overflow: hidden; -webkit-mask-image: linear-gradient(#000 70%, transparent); }

  .trow { padding: 2px 0; color: #adbac7; }
  .trow .tmark { font-size: 14px; }
  .trow .tassignee { color: #6e7681; }
  .donecount { color: #3fb950; opacity: .65; font-size: 11px; margin-top: 8px; padding-top: 6px; border-top: 1px solid #141a24; }

  /* login overlay */
  #overlay { position: fixed; inset: 0; background: #0b0e14; display: none; place-items: center; z-index: 10; }
  #overlay .card2 { background: #11161f; border: 1px solid #1c2230; border-radius: 14px; padding: 28px; width: 320px; }
  #overlay h1 { margin: 0 0 4px; font-size: 20px; }
  #overlay p { margin: 0 0 18px; color: #8b949e; }
  #overlay input { width: 100%; padding: 10px 12px; background: #0b0e14; border: 1px solid #1c2230; border-radius: 8px; color: #c9d1d9; font: inherit; }
  #overlay button { width: 100%; margin-top: 10px; padding: 10px; background: #238636; border: 0; border-radius: 8px; color: #fff; font: inherit; cursor: pointer; }
  #loginErr { color: #f85149; margin-top: 10px; font-size: 12px; min-height: 1em; }
</style>
</head>
<body>
  <header>
    <span class="brand">▚ mesh</span>
    <span class="stat"><b id="s-online">0</b> online</span>
    <span class="stat"><b id="s-working">0</b> working</span>
    <span class="stat"><b id="s-tasks">0</b> open tasks</span>
    <span class="stat"><b id="s-msgs">0</b> msgs</span>
    <span class="updated" id="updated">connecting…</span>
    <button class="out" id="logout">log out</button>
  </header>
  <div class="wrap">
    <div class="col org">
      <h2>Org chart · who's doing what</h2>
      <div id="org"></div>
    </div>
    <div class="right">
      <div class="feed" id="feedWrap">
        <h2>Live messages</h2>
        <div id="feed"></div>
      </div>
      <div class="tasks">
        <h2>Task board</h2>
        <div id="tasks"></div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <form class="card2" id="loginForm">
      <h1>mesh</h1>
      <p>Enter the mesh code to watch the board.</p>
      <input id="code" type="password" autocomplete="off" placeholder="mesh code" autofocus />
      <button type="submit">Enter</button>
      <div id="loginErr"></div>
    </form>
  </div>

<script>
const COLORS = { working:'#3fb950', idle:'#8b949e', blocked:'#f85149', done:'#58a6ff' };
const PALETTE = ['#58a6ff','#3fb950','#d29922','#bc8cff','#f778ba','#56d4dd','#ff7b72','#a5d6ff'];
const color = s => COLORS[s] || '#8b949e';
const esc = s => String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const senderColor = n => PALETTE[[...String(n)].reduce((a,c)=>a+c.charCodeAt(0),0) % PALETTE.length];
const ago = ts => { const s = Math.round((Date.now() - new Date(ts)) / 1000); return s < 60 ? s + 's ago' : Math.round(s/60) + 'm ago'; };

function renderOrg(peers, taskByPeer, lastMsg) {
  const names = new Set(peers.map(p => p.name));
  const kids = {};
  for (const p of peers) {
    const k = (p.parent && names.has(p.parent)) ? p.parent : '__root';
    (kids[k] = kids[k] || []).push(p);
  }
  const node = p => {
    const off = !p.online;
    const task = taskByPeer[p.name];
    const recent = !off && p.active; // pinged the mesh in the last ~90s
    // Working if they OWN an in-progress task (heads-down deep work counts) OR
    // pinged recently. Idle only if neither. Blocked/done honored as reported.
    // The pulse means "live right now"; a working agent that's gone quiet shows
    // working (it owns the task) but doesn't pulse, with a "quiet Xm" cue.
    const st = off ? 'offline'
      : p.status === 'blocked' ? 'blocked'
      : p.status === 'done' ? 'done'
      : (task || recent) ? 'working'
      : 'idle';
    const working = st === 'working';
    const blocked = st === 'blocked';
    const pulse = working && recent;
    const children = (kids[p.name] || []).sort((a,b)=>a.name.localeCompare(b.name));
    return `<div class="node">
      <div class="card ${off?'off':''} ${pulse?'live':''}">
        <span class="dot ${pulse?'pulse':''} ${blocked?'pulse-red':''}" style="background:${off?'#3a4150':color(st)}"></span>
        <span class="name">${esc(p.name)}</span>
        ${p.host ? `<span class="host">@${esc(p.host)}</span>` : ''}
        <span class="pill" style="color:${off?'#8b949e':color(st)};border-color:${off?'#3a4150':color(st)}">${off?'offline':esc(st)}</span>
        ${(() => {
          if (off) return '';
          const lm = lastMsg[p.name];
          // freshness: pulsing = live; otherwise show how long since they last spoke
          const when = (st !== 'idle' && lm) ? ` <span class="when">· ${recent ? '' : 'quiet '}last spoke ${ago(lm.ts)}</span>` : '';
          let doing;
          if (st === 'blocked') {
            const since = p.blocked_since ? ` (${ago(p.blocked_since)})` : '';
            doing = `<span class="blockedlbl">blocked${since}:</span> ` + esc(p.blocked_reason || p.current_task || 'reason not given');
          }
          else if (task) doing = '<span class="building">building:</span> ' + esc(task.title);
          else if (st === 'working') doing = p.current_task ? esc(p.current_task) : '<span class="dim2">coordinating</span>';
          else doing = '<span class="dim2">idle / standing by</span>';
          return `<div class="task">${doing}${when}</div>`;
        })()}
      </div>
      ${children.length ? `<div class="kids">${children.map(node).join('')}</div>` : ''}
    </div>`;
  };
  const roots = (kids['__root'] || []).sort((a,b)=>a.name.localeCompare(b.name));
  return roots.map(node).join('') || '<div class="empty">no agents on the mesh</div>';
}

function renderFeed(msgs) {
  if (!msgs.length) return '<div class="empty">no messages yet</div>';
  return msgs.map(m => {
    const bcast = !(m.recipients && m.recipients.length);
    const to = bcast ? '→ all' : '→ ' + m.recipients.join(', ');
    const long = String(m.content).length > 240;
    return `<div class="msg">
      <div class="meta">
        <span class="time">${new Date(m.ts).toLocaleTimeString()}</span>
        <span class="from" style="color:${senderColor(m.sender)}">${esc(m.sender)}</span>
        <span class="to ${bcast?'bcast':''}">${esc(to)}</span>
      </div>
      <div class="body ${long?'long':''}">${esc(m.content)}</div>
    </div>`;
  }).join('');
}

function renderTasks(tasks) {
  if (!tasks.length) return '<div class="empty">no tasks</div>';
  const mark = { backlog:'○', design:'✎', in_progress:'◐', blocked:'⊘' };
  const mc = { backlog:'#8b949e', design:'#bc8cff', in_progress:'#3fb950', blocked:'#f85149' };
  const order = { in_progress:0, blocked:1, design:2, backlog:3 };
  // only the live work; done tasks collapse into a count so the board stays current
  const active = tasks.filter(t => t.status !== 'done')
    .sort((a,b) => (order[a.status]??4) - (order[b.status]??4) || a.num - b.num);
  const done = tasks.length - active.length;
  const rows = active.length
    ? active.map(t => {
        const gate = (t.gating && t.gating.length) ? ` <span class="gate">⛔ needs ${t.gating.map(n=>'#'+n).join(', ')}</span>` : '';
        const base = t.base ? ` <span class="tbase">base ${esc(t.base)}</span>` : '';
        const design = t.status === 'design' ? ' <span class="tbase">[design]</span>' : '';
        return `<div class="trow"><span class="tmark" style="color:${mc[t.status]||'#8b949e'}">${mark[t.status]||'○'}</span> #${t.num} ${esc(t.title)} ${t.assignee?`<span class="tassignee">@${esc(t.assignee)}</span>`:''}${design}${base}${gate}</div>`;
      }).join('')
    : '<div class="empty">no active tasks</div>';
  return rows + (done ? `<div class="donecount">✓ ${done} completed</div>` : '');
}

function showLogin(show) { document.getElementById('overlay').style.display = show ? 'grid' : 'none'; }

async function tick() {
  let res;
  try { res = await fetch('/api/mesh/state', { cache: 'no-store' }); }
  catch { document.getElementById('updated').textContent = 'connection lost…'; return; }
  if (res.status === 401) { showLogin(true); if (es) { es.close(); es = null; } return; }
  showLogin(false);
  connectStream();
  let j; try { j = await res.json(); } catch { return; }
  if (!j || j.error) { document.getElementById('updated').textContent = 'error: ' + (j&&j.error || 'no data'); return; }

  const peers = j.peers || [], tasks = j.tasks || [], msgs = j.messages || [];
  const lastMsg = {};
  for (const m of msgs) lastMsg[m.sender] = m; // later in the array = more recent, so this ends on each peer's latest
  const taskByPeer = {};
  for (const t of tasks) if (t.status === 'in_progress' && t.assignee) taskByPeer[t.assignee] = t;
  document.getElementById('org').innerHTML = renderOrg(peers, taskByPeer, lastMsg);
  document.getElementById('tasks').innerHTML = renderTasks(tasks);

  const feed = document.getElementById('feed'), wrap = document.getElementById('feedWrap');
  const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 120;
  feed.innerHTML = renderFeed(msgs);
  if (atBottom) wrap.scrollTop = wrap.scrollHeight;

  document.getElementById('s-online').textContent = peers.filter(p=>p.online).length;
  document.getElementById('s-working').textContent = peers.filter(p=>p.online && p.status==='working').length;
  document.getElementById('s-tasks').textContent = tasks.filter(t=>t.status!=='done').length;
  document.getElementById('s-msgs').textContent = msgs.length;
  document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString();
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const code = document.getElementById('code').value.trim();
  const r = await fetch('/api/auth', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ code }) });
  if (r.ok) { document.getElementById('loginErr').textContent = ''; document.getElementById('code').value = ''; tick(); }
  else { document.getElementById('loginErr').textContent = 'wrong code'; }
});
document.getElementById('logout').addEventListener('click', async () => {
  await fetch('/api/auth', { method:'DELETE' });
  showLogin(true);
});

// Live updates: subscribe to the server's change stream and redraw on any ping
// (a message, a status/task change, a peer joining/leaving) in well under a
// second. The slow interval is just a safety net if the stream drops.
let es = null;
function connectStream() {
  if (es) return;
  try { es = new EventSource('/api/mesh/events'); } catch { return; }
  es.onmessage = () => tick();
}
tick();
setInterval(tick, 5000);
</script>
</body>
</html>
